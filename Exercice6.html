<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    // Déclaration des variables
    let x = "10";   // chaîne de caractères
    let y = 10;     // nombre
    console.log("x =", x, " et type =", typeof x);
    console.log("y =", y, " et type =", typeof y);
    // Comparaisons
    console.log("x == y  :", x == y);
    console.log("x === y :", x === y);
    console.log("x != y  :", x != y);
    console.log("x !== y :", x !== y);
</script>
</body>
</html>
