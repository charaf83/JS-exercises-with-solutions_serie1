<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>
    let a = Number(prompt("Entrez le premier entier (a ≥ 1) :"));
    let b = Number(prompt("Entrez le deuxième entier (b ≥ 1) :"));

    if (a >= 1 && b >= 1 && !isNaN(a) && !isNaN(b)) {

        while (b !== 0) {
            let r = a % b;
            a = b;
            b = r;
        }

        alert("Le PGCD est : " + a);

    } else {
        alert("Veuillez saisir deux entiers valides ≥ 1.");
    }
</script>
</body>
</html>
