//question 2)
    let taille = Number(prompt("Entrez votre taille en cm :"));
    let age = Number(prompt("Entrez votre âge :"));
    let sexe = prompt("Entrez votre sexe (M/F) :");
    let poids;

    if (sexe === "m" || sexe === "M") {
        poids = (taille - 100 + age/10) * 0.8;
    }
    else if (sexe === "f" || sexe === "F") {
        poids = (taille - 100 + age/10) * 0.9;
    }
    alert("Votre poids idéal est : " + poids);
</script>
