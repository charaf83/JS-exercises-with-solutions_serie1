<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>
    // Déclaration et initialisation des variables
    let nom = "Amine";       // chaîne de caractères
    let age = 25;            // nombre
    let estEtudiant = true;  // booléen

    // Affichage des valeurs et de leur type
    console.log("nom =", nom, "| type =", typeof nom);           // string
    console.log("age =", age, "| type =", typeof age);           // number
    console.log("estEtudiant =", estEtudiant, "| type =", typeof estEtudiant);  // boolean
</script>

</body>
</html>
