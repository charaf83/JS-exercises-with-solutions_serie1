<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      //1) et 2)
    let age = parseInt(prompt("Entrez votre âge :"));

    if (age >= 18 && age <= 30) {
        document.write("Votre âge est compris entre 18 et 30.");
    } 
    else if (age < 18 || age > 30) {
        document.write("Votre âge est inférieur à 18 ou supérieur à 30.");
    }

</script>
</body>
</html>
